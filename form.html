<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Grid - Форма</title>
</head>
<body>
    <h2>Додати споживача</h2>
    <form action="/submit" method="POST">
        <input type="hidden" name="formType" value="consumer">
        Ім’я: <input type="text" name="name" required><br>
        Адреса: <input type="text" name="address" required><br>
        Дата підключення: <input type="date" name="date" required><br>
        <button type="submit">Зберегти</button>
    </form>

    <h2>Додати дані датчика</h2>
    <form action="/submit" method="POST">
        <input type="hidden" name="formType" value="sensor">
        Напруга (В): <input type="number" step="0.01" name="voltage" required><br>
        Струм (А): <input type="number" step="0.01" name="current" required><br>
        <button type="submit">Зберегти</button>
    </form>
</body>
</html>
